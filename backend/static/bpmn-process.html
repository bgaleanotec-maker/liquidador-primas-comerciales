<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidacion de Primas Comerciales - Grupo Vanti</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--border:#2a3454;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-bright:#f8fafc;
  --blue:#3b82f6;--blue-dim:#1e3a6e;
  --green:#10b981;--green-dim:#064e3b;
  --orange:#f59e0b;--orange-dim:#78350f;
  --purple:#a855f7;--purple-dim:#4c1d95;
  --red:#ef4444;
  --radius:8px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden;min-height:100vh}
.close-btn{position:fixed;top:16px;right:16px;z-index:1000;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);padding:8px 20px;border-radius:var(--radius);cursor:pointer;font-size:.875rem;backdrop-filter:blur(8px);transition:all .2s}
.close-btn:hover{background:var(--red);border-color:var(--red);color:#fff}
.header{text-align:center;padding:24px 20px 8px}
.header h1{font-size:1.3rem;font-weight:700;color:var(--text-bright);letter-spacing:.02em}
.header p{color:var(--text-dim);font-size:.78rem;margin-top:4px}
.kpi-bar{display:flex;justify-content:center;gap:12px;padding:10px 20px 14px;flex-wrap:wrap}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;min-width:155px;text-align:center;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-card.c-blue::before{background:var(--blue)}
.kpi-card.c-green::before{background:var(--green)}
.kpi-card.c-orange::before{background:var(--orange)}
.kpi-card.c-purple::before{background:var(--purple)}
.kpi-value{font-size:1.4rem;font-weight:700;color:var(--text-bright);font-variant-numeric:tabular-nums}
.kpi-label{font-size:.68rem;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.diagram-wrap{overflow:auto;padding:4px 12px 28px}
.diagram-wrap::-webkit-scrollbar{height:6px;width:6px}
.diagram-wrap::-webkit-scrollbar-track{background:var(--surface)}
.diagram-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
svg.bpmn{display:block;margin:0 auto}
.lane-bg{stroke:var(--border);stroke-width:1}
.lane-header{stroke-width:1}
.lane-label{font-weight:600;letter-spacing:.03em}
.node-rect{rx:6;ry:6;stroke-width:1.5;cursor:pointer;transition:filter .2s}
.node-rect:hover{filter:brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,.15))}
.node-text{pointer-events:none;font-weight:500}
.start-circle{fill:#10b981;stroke:#34d399;stroke-width:2;cursor:pointer}
.end-circle{fill:var(--red);stroke:#f87171;stroke-width:2;cursor:pointer}
.gateway{cursor:pointer;transition:filter .2s}
.gateway:hover{filter:brightness(1.3)}
.gateway-diamond{stroke-width:1.5}
.flow-line{fill:none;stroke:var(--border);stroke-width:1.2}
.flow-yes{stroke:var(--green)}
.flow-no{stroke:var(--red)}
.bpmn-tooltip{position:fixed;background:#1e293b;border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-size:.78rem;max-width:260px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.5);line-height:1.45}
.bpmn-tooltip.visible{opacity:1}
.bpmn-tooltip .tt-title{font-weight:700;color:var(--text-bright);margin-bottom:4px;font-size:.82rem}
@keyframes flowPulse{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
.flow-animated{stroke-dasharray:6 4;animation:flowPulse .8s linear infinite}
@media(max-width:768px){
  .kpi-bar{gap:8px}.kpi-card{min-width:130px;padding:8px 12px}.kpi-value{font-size:1.2rem}.header h1{font-size:1.1rem}html{font-size:12px}
}
@media(max-width:480px){
  .kpi-bar{flex-direction:column;align-items:center}.kpi-card{width:90%}
}
</style>
</head>
<body>
<button class="close-btn" id="closeBtn" onclick="window.parent.postMessage('closeBpmn','*');if(window.closeBpmnModal)window.closeBpmnModal();">Cerrar &times;</button>
<div class="header">
  <h1>Liquidacion de Primas Comerciales</h1>
  <p>Grupo Vanti &mdash; Flujo del Proceso BPMN 2.0</p>
</div>
<div class="kpi-bar">
  <div class="kpi-card c-blue"><div class="kpi-value" id="k1">0%</div><div class="kpi-label">Cumplimiento Promedio</div></div>
  <div class="kpi-card c-green"><div class="kpi-value" id="k2">0</div><div class="kpi-label">Liquidaciones Procesadas</div></div>
  <div class="kpi-card c-orange"><div class="kpi-value" id="k3">0</div><div class="kpi-label">Tiempo Promedio Aprobacion</div></div>
  <div class="kpi-card c-purple"><div class="kpi-value" id="k4">0%</div><div class="kpi-label">Tasa de Aprobacion</div></div>
</div>
<div class="diagram-wrap" id="dw"></div>
<div class="bpmn-tooltip" id="tt"></div>

<script>
(function(){
const NS='http://www.w3.org/2000/svg';
function E(t,a){const e=document.createElementNS(NS,t);if(a)for(const[k,v]of Object.entries(a))e.setAttribute(k,String(v));return e}
function T(t,txt,a){const e=E(t,a);e.textContent=txt;return e}

// Dimensions
const HDR=34, LW=1100, LH=100, TM=16, LM=0;
const NW=128, NH=38, GS=32;
const totalW=HDR+LW+30, totalH=TM+4*LH+30;
const X0=HDR+18, XE=HDR+LW-12;
const CW=XE-X0;
function px(p){return X0+CW*p}
function ly(i){return TM+i*LH+LH/2}

const LC=[
  {s:'#3b82f6',f:'#1e3a6e',l:'Analista'},
  {s:'#10b981',f:'#064e3b',l:'Sistema'},
  {s:'#f59e0b',f:'#78350f',l:'Aprobador N1'},
  {s:'#a855f7',f:'#4c1d95',l:'Admin N2'}
];

// Tooltip descriptions
const tips={
  start:'Inicio del proceso de liquidacion de primas comerciales para el periodo.',
  config_llaves:'Se configuran las LLAVEs (KPIs) y sus pesos porcentuales para el periodo. Ejemplo: LLAVE1=40%, LLAVE2=30%, LLAVE3=20%, LLAVE4=10%.',
  reg_pdv:'Se registran los Puntos de Venta (PdV) y los Profesionales que participan en el periodo.',
  asignar_prof:'Se asigna cada Profesional a su Punto de Venta correspondiente para el periodo activo.',
  cargar_ventas:'Se cargan los datos de ventas al sistema, ya sea mediante archivo CSV o ingreso manual.',
  validar_datos:'El sistema valida la integridad y consistencia de los datos de ventas cargados.',
  gw_datos:'Si los datos son correctos continua el proceso. Si hay errores se debe volver a cargar.',
  calc_kpi:'El sistema calcula automaticamente el cumplimiento de cada KPI por profesional y punto de venta.',
  aplicar_pesos:'Se aplican los pesos configurados: LLAVE1=40%, LLAVE2=30%, LLAVE3=20%, LLAVE4=10%.',
  calc_score:'Se calcula el Score Total como la suma ponderada de los scores de cada KPI.',
  gen_liq:'Se genera la liquidacion: Prima = Score Total x Salario Base del profesional.',
  crear_aprobacion:'El sistema crea automaticamente los pasos del flujo de aprobacion (N1 y N2).',
  revisar_liq:'El Analista revisa la liquidacion calculada, verificando montos y asignaciones.',
  enviar_aprobacion:'El Analista envia la liquidacion al flujo de aprobacion para su revision.',
  revisar_n1:'El Aprobador de Nivel 1 revisa la liquidacion y puede aprobar o rechazar.',
  gw_n1:'Si aprueba pasa a N2. Si rechaza devuelve al Analista con comentarios.',
  devolver_n1:'La liquidacion se devuelve al Analista con comentarios para correccion.',
  validar_n2:'El Administrador N2 realiza la validacion final del negocio.',
  gw_n2:'Si aprueba se procede al registro de pago. Si rechaza devuelve al Analista.',
  reg_pago:'El sistema registra el pago aprobado en el sistema contable.',
  gen_reporte:'Se genera el reporte final de liquidacion con todos los detalles del periodo.',
  end:'Fin del proceso de liquidacion de primas.'
};

// Node definitions: id -> {x, y, lane, type, label}
const N={};
// Lane 0 - Analista: setup chain
N.start={x:px(.01),y:ly(0),ln:0,t:'start'};
N.config_llaves={x:px(.09),y:ly(0),ln:0,t:'task',lb:'Configurar\nLLAVEs y Pesos'};
N.reg_pdv={x:px(.22),y:ly(0),ln:0,t:'task',lb:'Registrar PdV\ny Profesionales'};
N.asignar_prof={x:px(.35),y:ly(0),ln:0,t:'task',lb:'Asignar Profesionales\na PdV'};
N.cargar_ventas={x:px(.48),y:ly(0),ln:0,t:'task',lb:'Cargar Ventas\n(CSV / Manual)'};
N.validar_datos={x:px(.61),y:ly(0),ln:0,t:'task',lb:'Validar Datos\nde Ventas'};
N.gw_datos={x:px(.72),y:ly(0),ln:0,t:'gw',lb:'Datos\nCorrectos?'};

// Lane 1 - Sistema: calculation chain
N.calc_kpi={x:px(.09),y:ly(1),ln:1,t:'task',lb:'Calcular\nCumplimiento KPIs'};
N.aplicar_pesos={x:px(.22),y:ly(1),ln:1,t:'task',lb:'Aplicar Pesos\npor LLAVE'};
N.calc_score={x:px(.35),y:ly(1),ln:1,t:'task',lb:'Calcular\nScore Total'};
N.gen_liq={x:px(.48),y:ly(1),ln:1,t:'task',lb:'Generar\nLiquidacion'};
N.crear_aprobacion={x:px(.61),y:ly(1),ln:1,t:'task',lb:'Crear Pasos\nde Aprobacion'};

// Lane 0 - Analista: review (right side)
N.revisar_liq={x:px(.80),y:ly(0),ln:0,t:'task',lb:'Revisar\nLiquidacion'};
N.enviar_aprobacion={x:px(.93),y:ly(0),ln:0,t:'task',lb:'Enviar para\nAprobacion'};

// Lane 2 - Aprobador N1
N.revisar_n1={x:px(.80),y:ly(2),ln:2,t:'task',lb:'Revisar\nLiquidacion N1'};
N.gw_n1={x:px(.68),y:ly(2),ln:2,t:'gw',lb:'Aprobado\nN1?'};
N.devolver_n1={x:px(.55),y:ly(2),ln:2,t:'task',lb:'Devolver con\nComentarios'};

// Lane 3 - Admin N2
N.validar_n2={x:px(.55),y:ly(3),ln:3,t:'task',lb:'Validacion\nFinal'};
N.gw_n2={x:px(.43),y:ly(3),ln:3,t:'gw',lb:'Aprobado\nN2?'};

// Lane 1 - Sistema: final
N.reg_pago={x:px(.80),y:ly(1),ln:1,t:'task',lb:'Registrar\nPago'};
N.gen_reporte={x:px(.91),y:ly(1),ln:1,t:'task',lb:'Generar\nReporte'};
N.end={x:px(.98),y:ly(1),ln:1,t:'end'};

// Build SVG
const svg=E('svg',{class:'bpmn',viewBox:`0 0 ${totalW} ${totalH}`,width:'100%'});
svg.style.maxWidth=totalW+'px';
svg.style.minWidth='750px';

// Defs
const defs=E('defs');
[[' ','#64748b'],['G','#10b981'],['R','#ef4444']].forEach(([id,c])=>{
  const m=E('marker',{id:'a'+id.trim()||'h',markerWidth:8,markerHeight:6,refX:7,refY:3,orient:'auto',markerUnits:'strokeWidth'});
  m.appendChild(E('path',{d:'M0,0 L8,3 L0,6 Z',fill:c}));
  defs.appendChild(m);
});
svg.appendChild(defs);

// Draw lanes
for(let i=0;i<4;i++){
  const y=TM+i*LH;
  svg.appendChild(E('rect',{x:0,y:y,width:HDR+LW,height:LH,class:'lane-bg',fill:'rgba(255,255,255,.015)'}));
  svg.appendChild(E('rect',{x:0,y:y,width:HDR,height:LH,class:'lane-header',fill:LC[i].f,stroke:LC[i].s}));
  svg.appendChild(T('text',LC[i].l,{x:HDR/2,y:y+LH/2,class:'lane-label',fill:LC[i].s,'font-size':'11','text-anchor':'middle','dominant-baseline':'central',transform:`rotate(-90,${HDR/2},${y+LH/2})`}));
}

// Flow group (drawn behind nodes)
const flowG=E('g',{id:'flows'});
svg.appendChild(flowG);

// Draw nodes
const nodeEls={};
for(const[id,n]of Object.entries(N)){
  const g=E('g',{'data-id':id,style:'cursor:pointer'});
  const lc=LC[n.ln];
  if(n.t==='start'){
    g.appendChild(E('circle',{cx:n.x,cy:n.y,r:13,class:'start-circle'}));
    g.appendChild(T('text','Inicio',{x:n.x,y:n.y+24,fill:'#10b981','font-size':'8','text-anchor':'middle','font-weight':'600'}));
  }else if(n.t==='end'){
    g.appendChild(E('circle',{cx:n.x,cy:n.y,r:13,class:'end-circle'}));
    g.appendChild(E('circle',{cx:n.x,cy:n.y,r:9,fill:'none',stroke:'#fca5a5','stroke-width':2}));
    g.appendChild(T('text','Fin',{x:n.x,y:n.y+24,fill:'#ef4444','font-size':'8','text-anchor':'middle','font-weight':'600'}));
  }else if(n.t==='gw'){
    const gg=E('g',{class:'gateway',transform:`translate(${n.x},${n.y})`});
    gg.appendChild(E('rect',{x:-GS/2,y:-GS/2,width:GS,height:GS,transform:'rotate(45)',fill:lc.f,stroke:lc.s,class:'gateway-diamond'}));
    if(n.lb){
      n.lb.split('\n').forEach((l,i)=>{
        gg.appendChild(T('text',l,{x:0,y:-4+i*10,fill:lc.s,'font-size':'7.5','font-weight':'600','text-anchor':'middle','dominant-baseline':'central'}));
      });
    }
    g.appendChild(gg);
  }else{
    const rx=n.x-NW/2, ry=n.y-NH/2;
    g.appendChild(E('rect',{x:rx,y:ry,width:NW,height:NH,class:'node-rect',fill:lc.f,stroke:lc.s}));
    if(n.lb){
      const lines=n.lb.split('\n');
      lines.forEach((l,i)=>{
        g.appendChild(T('text',l,{x:n.x,y:n.y+(i-(lines.length-1)/2)*12,class:'node-text',fill:'#f1f5f9','font-size':'10','text-anchor':'middle','dominant-baseline':'central'}));
      });
    }
  }
  svg.appendChild(g);
  nodeEls[id]=g;
}

// Anchor helper
function anc(id,side){
  const n=N[id];
  const r=n.t==='start'||n.t==='end'?13:(n.t==='gw'?GS/2*Math.SQRT2*.72:0);
  if(n.t==='start'||n.t==='end'){
    return{right:{x:n.x+r,y:n.y},left:{x:n.x-r,y:n.y},top:{x:n.x,y:n.y-r},bottom:{x:n.x,y:n.y+r}}[side];
  }
  if(n.t==='gw'){
    return{right:{x:n.x+r,y:n.y},left:{x:n.x-r,y:n.y},top:{x:n.x,y:n.y-r},bottom:{x:n.x,y:n.y+r}}[side];
  }
  return{right:{x:n.x+NW/2,y:n.y},left:{x:n.x-NW/2,y:n.y},top:{x:n.x,y:n.y-NH/2},bottom:{x:n.x,y:n.y+NH/2}}[side];
}

function addFlow(d,cls,mkr){
  const p=E('path',{d:d,class:'flow-line'+(cls?' '+cls:''),'marker-end':mkr||'url(#ah)'});
  flowG.appendChild(p);
  return p;
}
function addLabel(x,y,txt,cls){
  flowG.appendChild(T('text',txt,{x:x,y:y,class:cls,'font-size':'8','font-weight':'700','text-anchor':'middle'}));
}

// Straight horizontal
function hFlow(from,fside,to,tside){
  const a=anc(from,fside),b=anc(to,tside);
  addFlow(`M${a.x},${a.y} L${b.x},${b.y}`);
}
// Orthogonal via midpoint
function vFlow(from,fside,to,tside,cls,mkr){
  const a=anc(from,fside),b=anc(to,tside);
  const my=(a.y+b.y)/2;
  if(Math.abs(a.x-b.x)<2) addFlow(`M${a.x},${a.y} L${b.x},${b.y}`,cls,mkr);
  else addFlow(`M${a.x},${a.y} L${a.x},${my} L${b.x},${my} L${b.x},${b.y}`,cls,mkr);
}

// --- Draw all flows ---

// Analista setup chain (horizontal, left to right)
hFlow('start','right','config_llaves','left');
hFlow('config_llaves','right','reg_pdv','left');
hFlow('reg_pdv','right','asignar_prof','left');
hFlow('asignar_prof','right','cargar_ventas','left');
hFlow('cargar_ventas','right','validar_datos','left');
hFlow('validar_datos','right','gw_datos','left');

// gw_datos -> No: loop back up to cargar_ventas
(function(){
  const a=anc('gw_datos','top'), b=anc('cargar_ventas','top');
  const upY=TM+6;
  addFlow(`M${a.x},${a.y} L${a.x},${upY} L${b.x},${upY} L${b.x},${b.y}`,'flow-no','url(#aR)');
  addLabel((a.x+b.x)/2, upY-4, 'No', 'flow-no');
})();

// gw_datos -> Yes: down to calc_kpi (Sistema lane)
(function(){
  const a=anc('gw_datos','bottom'), b=anc('calc_kpi','top');
  const my=(a.y+b.y)/2;
  addFlow(`M${a.x},${a.y} L${a.x},${my} L${b.x},${my} L${b.x},${b.y}`,'flow-yes','url(#aG)');
  addLabel(a.x+10, a.y+14, 'Si', 'flow-yes');
})();

// Sistema chain
hFlow('calc_kpi','right','aplicar_pesos','left');
hFlow('aplicar_pesos','right','calc_score','left');
hFlow('calc_score','right','gen_liq','left');
hFlow('gen_liq','right','crear_aprobacion','left');

// crear_aprobacion -> up to revisar_liq (Analista)
vFlow('crear_aprobacion','top','revisar_liq','bottom');

// revisar_liq -> enviar_aprobacion
hFlow('revisar_liq','right','enviar_aprobacion','left');

// enviar_aprobacion -> down to revisar_n1 (Aprobador N1)
vFlow('enviar_aprobacion','bottom','revisar_n1','top');

// revisar_n1 -> gw_n1 (left)
hFlow('revisar_n1','left','gw_n1','right');

// gw_n1 No -> devolver_n1 (left)
(function(){
  const a=anc('gw_n1','left'), b=anc('devolver_n1','right');
  addFlow(`M${a.x},${a.y} L${b.x},${b.y}`,'flow-no','url(#aR)');
  addLabel((a.x+b.x)/2, a.y-6, 'No', 'flow-no');
})();

// devolver_n1 -> up to revisar_liq (feedback loop)
(function(){
  const a=anc('devolver_n1','top');
  const b=anc('revisar_liq','bottom');
  // Route: up from devolver, across to revisar_liq x, then up into it
  const midY=ly(1); // route through Sistema lane center
  addFlow(`M${a.x},${a.y} L${a.x},${midY} L${b.x},${midY} L${b.x},${b.y}`,'flow-no','url(#aR)');
})();

// gw_n1 Yes -> down to validar_n2 (Admin N2)
(function(){
  const a=anc('gw_n1','bottom'), b=anc('validar_n2','top');
  const my=(a.y+b.y)/2;
  addFlow(`M${a.x},${a.y} L${a.x},${my} L${b.x},${my} L${b.x},${b.y}`,'flow-yes','url(#aG)');
  addLabel(a.x+10, a.y+14, 'Si', 'flow-yes');
})();

// validar_n2 -> gw_n2 (left)
hFlow('validar_n2','left','gw_n2','right');

// gw_n2 No -> back to revisar_liq (big loop going down and around)
(function(){
  const a=anc('gw_n2','bottom');
  const b=anc('revisar_liq','bottom');
  const bottomY=TM+4*LH+16;
  addFlow(`M${a.x},${a.y} L${a.x},${bottomY} L${b.x},${bottomY} L${b.x},${b.y}`,'flow-no','url(#aR)');
  addLabel(a.x+10, a.y+14, 'No', 'flow-no');
})();

// gw_n2 Yes -> up to reg_pago (Sistema lane)
(function(){
  const a=anc('gw_n2','top');
  const b=anc('reg_pago','bottom');
  const midY=ly(2); // through middle of Aprobador lane
  addFlow(`M${a.x},${a.y} L${a.x},${midY} L${b.x},${midY} L${b.x},${b.y}`,'flow-yes','url(#aG)');
  addLabel(a.x-14, a.y-12, 'Si', 'flow-yes');
})();

// reg_pago -> gen_reporte
hFlow('reg_pago','right','gen_reporte','left');
// gen_reporte -> end
hFlow('gen_reporte','right','end','left');

// Insert SVG
document.getElementById('dw').appendChild(svg);

// Tooltips
const tt=document.getElementById('tt');
for(const[id,g]of Object.entries(nodeEls)){
  g.addEventListener('mouseenter',function(e){
    if(!tips[id])return;
    const lb=N[id].lb?N[id].lb.replace(/\n/g,' '):(id==='start'?'Inicio':'Fin');
    tt.innerHTML='<div class="tt-title">'+lb+'</div>'+tips[id];
    tt.classList.add('visible');
    mvTT(e);
  });
  g.addEventListener('mousemove',mvTT);
  g.addEventListener('mouseleave',()=>tt.classList.remove('visible'));
}
function mvTT(e){
  let x=e.clientX+14,y=e.clientY+14;
  if(x+270>window.innerWidth)x=e.clientX-270;
  if(y+100>window.innerHeight)y=e.clientY-100;
  tt.style.left=x+'px';tt.style.top=y+'px';
}

// Animated KPI counters
const kpis=[
  {el:document.getElementById('k1'),target:87.5,dec:1,suf:'%'},
  {el:document.getElementById('k2'),target:58,dec:0,suf:''},
  {el:document.getElementById('k3'),target:2.3,dec:1,suf:' dias'},
  {el:document.getElementById('k4'),target:94,dec:0,suf:'%'}
];
const t0=performance.now();
function animKPI(now){
  const p=Math.min((now-t0)/1800,1);
  const ease=1-Math.pow(1-p,3);
  kpis.forEach(k=>{k.el.textContent=(k.target*ease).toFixed(k.dec)+k.suf;});
  if(p<1)requestAnimationFrame(animKPI);
}
requestAnimationFrame(animKPI);

// Subtle flow pulse
const paths=flowG.querySelectorAll('.flow-line');
let ai=0;
function pulse(){
  paths.forEach(p=>p.classList.remove('flow-animated'));
  if(paths[ai])paths[ai].classList.add('flow-animated');
  ai=(ai+1)%paths.length;
}
setInterval(pulse,1500);
pulse();

})();
</script>
